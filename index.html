<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ことわざクイズ！</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Maru Gothic Pro', 'メイリオ', 'Meiryo', sans-serif;
      background: linear-gradient(135deg, #6C63FF 0%, #3EC6E0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ---- 背景の星 ---- */
    #bg-stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      animation: twinkle 2s infinite ease-in-out;
    }
    @keyframes twinkle {
      0%,100% { opacity: .3; transform: scale(1); }
      50%      { opacity: 1;  transform: scale(1.4); }
    }

    /* ---- コンテナ ---- */
    .card {
      background: #fff;
      border-radius: 32px;
      padding: 36px 32px 32px;
      width: min(560px, 92vw);
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
      position: relative;
      z-index: 1;
      text-align: center;
    }

    /* ---- スクリーン切り替え ---- */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ---- スタート画面 ---- */
    .title {
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 900;
      background: linear-gradient(135deg, #FF6B6B, #FFE66D, #4ECDC4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .mascot {
      font-size: clamp(4rem, 14vw, 6rem);
      display: block;
      margin: 16px 0;
      animation: hop 1.6s ease-in-out infinite;
    }
    @keyframes hop {
      0%,100% { transform: translateY(0)   rotate(-4deg); }
      40%      { transform: translateY(-18px) rotate(4deg); }
    }
    .subtitle { font-size: 1.1rem; color: #666; margin-bottom: 28px; line-height: 1.6; }

    /* ---- ボタン共通 ---- */
    .btn {
      display: inline-block;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:active { transform: scale(.94) !important; }

    .btn-start {
      padding: 16px 48px;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      box-shadow: 0 8px 24px rgba(255,107,107,.45);
      animation: pulse-btn 1.5s ease-in-out infinite;
    }
    @keyframes pulse-btn {
      0%,100% { box-shadow: 0 8px 24px rgba(255,107,107,.45); }
      50%      { box-shadow: 0 8px 40px rgba(255,107,107,.8); transform: scale(1.04); }
    }

    /* ---- プログレス ---- */
    .q-label { font-size: .85rem; color: #aaa; margin-bottom: 4px; }
    .prog-wrap {
      background: #eee;
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
      margin-bottom: 22px;
    }
    .prog-bar {
      height: 100%;
      background: linear-gradient(90deg, #4ECDC4, #44A08D);
      border-radius: 8px;
      transition: width .5s ease;
    }

    /* ---- 問題 ---- */
    .q-emoji { font-size: clamp(2.5rem, 10vw, 3.5rem); margin-bottom: 8px; display: block; }
    .q-text  {
      font-size: clamp(1.2rem, 4.5vw, 1.6rem);
      font-weight: 700;
      color: #333;
      margin-bottom: 20px;
      line-height: 1.6;
      white-space: pre-line;
    }

    /* ---- 選択肢 ---- */
    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-ans {
      padding: 14px 16px;
      border: 3px solid #ddd;
      border-radius: 18px;
      font-size: clamp(.95rem, 3.5vw, 1.1rem);
      font-weight: 700;
      background: #fff;
      color: #333;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      line-height: 1.5;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-ans:hover:not(:disabled) {
      transform: translateX(4px);
      box-shadow: 0 6px 18px rgba(0,0,0,.1);
    }
    .btn-ans:nth-child(1) { border-color: #FF6B6B; }
    .btn-ans:nth-child(2) { border-color: #4ECDC4; }
    .btn-ans:nth-child(3) { border-color: #F39C12; }
    .btn-ans:nth-child(4) { border-color: #A29BFE; }

    .btn-ans.correct {
      background: #55EFC4; border-color: #00B894; color: #005740;
      animation: correct-pop .5s ease;
    }
    .btn-ans.wrong {
      background: #FF7675; border-color: #D63031; color: #fff;
      animation: shake .4s ease;
    }
    .btn-ans.reveal { background: #55EFC4; border-color: #00B894; color: #005740; }

    @keyframes correct-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%     { transform: translateX(-10px); }
      75%     { transform: translateX(10px); }
    }

    /* ---- 次へボタン ---- */
    .btn-next {
      margin-top: 20px;
      padding: 13px 36px;
      font-size: 1.15rem;
      background: linear-gradient(135deg, #6C63FF, #3EC6E0);
      color: #fff;
      box-shadow: 0 6px 18px rgba(108,99,255,.35);
      opacity: 0;
      pointer-events: none;
      transition: opacity .4s;
    }
    .btn-next.show { opacity: 1; pointer-events: auto; }

    /* ---- 結果画面 ---- */
    .result-title { font-size: clamp(1.5rem, 6vw, 2.2rem); font-weight: 900; color: #555; margin-bottom: 12px; }
    .result-stars { font-size: clamp(2rem, 8vw, 3rem); margin: 12px 0; }
    .score-big {
      font-size: clamp(3rem, 12vw, 5rem);
      font-weight: 900;
      background: linear-gradient(135deg, #FF6B6B, #FFE66D);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin: 4px 0 16px;
    }
    .result-msg { font-size: 1.2rem; color: #555; margin-bottom: 28px; line-height: 1.7; white-space: pre-line; }
    .btn-retry {
      padding: 14px 40px;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #A29BFE, #6C63FF);
      color: #fff;
      box-shadow: 0 8px 22px rgba(108,99,255,.4);
    }

    /* ---- フィードバックオーバーレイ ---- */
    #feedback {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 200;
    }
    #feedback-text {
      font-size: clamp(2.5rem, 10vw, 4rem);
      font-weight: 900;
      opacity: 0;
      transform: scale(.2);
      transition: opacity .25s, transform .3s;
      text-shadow: 0 4px 20px rgba(0,0,0,.2);
    }
    #feedback-text.in  { opacity: 1; transform: scale(1); }
    #feedback-text.out { opacity: 0; transform: scale(2); transition: opacity .3s, transform .4s; }

    /* ---- コンフェッティ ---- */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 150;
    }

    /* ---- 浮き上がり絵文字 ---- */
    .float-emoji {
      position: fixed;
      pointer-events: none;
      z-index: 155;
      animation: float-up 1.8s ease-out forwards;
    }
    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-220px) scale(1.6); }
    }
  </style>
</head>
<body>

<div id="bg-stars"></div>
<canvas id="confetti-canvas"></canvas>
<div id="feedback"><div id="feedback-text"></div></div>

<div class="card">

  <!-- ===== スタート画面 ===== -->
  <div class="screen active" id="s-start">
    <div class="title">ことわざ<br>クイズ！</div>
    <span class="mascot">📖</span>
    <p class="subtitle">5もんに チャレンジしよう！<br>ことわざの いみを こたえてね！</p>
    <button class="btn btn-start" onclick="startGame()">🌟 はじめる！ 🌟</button>
  </div>

  <!-- ===== 問題画面 ===== -->
  <div class="screen" id="s-question">
    <div class="q-label" id="q-label">もん 1 / 5</div>
    <div class="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <span class="q-emoji" id="q-emoji">🤔</span>
    <div class="q-text" id="q-text"></div>
    <div class="answers" id="answers"></div>
    <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">つぎへ！ →</button>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div class="screen" id="s-result">
    <div class="result-title">🎉 けっかはっぴょう！ 🎉</div>
    <div class="result-stars" id="result-stars"></div>
    <div class="score-big"><span id="score-num">0</span> / 5</div>
    <div class="result-msg" id="result-msg"></div>
    <button class="btn btn-retry" onclick="startGame()">🔄 もういちど！</button>
  </div>

</div>

// =============================================
//  ゲーム状態
// =============================================
let questions = [], qi = 0, score = 0, locked = false;

function shuffle(a) {
  const b = [...a];
  for (let i = b.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [b[i], b[j]] = [b[j], b[i]];
  }
  return b;
}

function startGame() {
  questions = shuffle(BANK).slice(0, 5);
  qi = 0; score = 0; locked = false;
  showScreen('s-question');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[qi];
  locked = false;

  document.getElementById('q-label').textContent = `もん ${qi + 1} / 5`;
  document.getElementById('prog-bar').style.width = `${qi / 5 * 100}%`;
  document.getElementById('q-emoji').textContent = q.e;
  document.getElementById('q-text').textContent = q.q;

  const correctText = q.opts[q.ci];

  // 選択肢をシャッフルして配置
  const shuffled = shuffle(q.opts.map((t, i) => ({ t, orig: i })));
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = '';
  shuffled.forEach(({ t }) => {
    const btn = document.createElement('button');
    btn.className = 'btn-ans';
    btn.style.whiteSpace = 'pre-line';
    btn.textContent = t;
    btn.dataset.val = t;
    btn.onclick = () => handleAnswer(btn, correctText);
    answersEl.appendChild(btn);
  });

  const nxt = document.getElementById('btn-next');
  nxt.classList.remove('show');
}

function handleAnswer(btn, correctText) {
  if (locked) return;
  locked = true;

  document.querySelectorAll('.btn-ans').forEach(b => b.disabled = true);

  if (btn.dataset.val === correctText) {
    score++;
    btn.classList.add('correct');
    playCorrect();
    showFeedback('⭐ せいかい！ ⭐', '#FFD700');
    launchConfetti();
    spawnEmojis(['🌟','✨','🎉','🎊','⭐','🌈','🦋']);
  } else {
    btn.classList.add('wrong');
    playWrong();
    showFeedback('😢 ざんねん…', '#FF6B6B');
    document.querySelectorAll('.btn-ans').forEach(b => {
      if (b.dataset.val === correctText) b.classList.add('reveal');
    });
  }

  setTimeout(() => {
    document.getElementById('btn-next').classList.add('show');
  }, 900);
}

function nextQuestion() {
  qi++;
  if (qi >= 5) { showResult(); return; }
  renderQuestion();
}

function showResult() {
  showScreen('s-result');
  document.getElementById('prog-bar').style.width = '100%';
  document.getElementById('score-num').textContent = score;

  let stars, msg;
  if (score === 5) {
    stars = '🌟🌟🌟🌟🌟';
    msg   = 'ぜんもん せいかい！\nすごい！かんぺき！！';
    launchConfetti(); launchConfetti();
    spawnEmojis(['🏆','🎉','🌟','🦄','🌈','🎊','✨','🎈']);
    setTimeout(playFanfare, 400);
  } else if (score >= 3) {
    stars = '⭐⭐⭐';
    msg   = `${score}もん せいかい！\nよくできました！すごいね！`;
    spawnEmojis(['🌟','✨','⭐']);
    setTimeout(playFanfare, 400);
  } else {
    stars = '⭐⭐';
    msg   = `${score}もん せいかい！\nつぎは もっと がんばろう！`;
  }

  document.getElementById('result-stars').textContent = stars;
  document.getElementById('result-msg').textContent   = msg;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// =============================================
//  サウンド（Web Audio API）
// =============================================
let actx = null;
function ctx() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  return actx;
}
function tone(freq, start, dur, vol = 0.35, type = 'triangle') {
  const c = ctx();
  const o = c.createOscillator();
  const g = c.createGain();
  o.connect(g); g.connect(c.destination);
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, c.currentTime + start);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
  o.start(c.currentTime + start);
  o.stop(c.currentTime + start + dur + 0.05);
}
function playCorrect() {
  [523, 659, 784, 1047].forEach((f, i) => tone(f, i * 0.1, 0.25));
}
function playWrong() {
  tone(280, 0, 0.18, 0.3, 'sawtooth');
  tone(230, 0.2, 0.25, 0.25, 'sawtooth');
}
function playFanfare() {
  const m = [523,523,523,659,523,659,784,784];
  m.forEach((f, i) => tone(f, i * 0.14, 0.22));
}

// =============================================
//  コンフェッティ
// =============================================
const cvs = document.getElementById('confetti-canvas');
const c2d = cvs.getContext('2d');
let pieces = [], rafId = null;

function resizeCvs() { cvs.width = innerWidth; cvs.height = innerHeight; }
addEventListener('resize', resizeCvs); resizeCvs();

function launchConfetti() {
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A29BFE','#55EFC4','#FF9FF3','#FFEAA7','#FD79A8'];
  for (let i = 0; i < 120; i++) {
    pieces.push({
      x: Math.random() * cvs.width,
      y: -10,
      w: 8 + Math.random() * 10,
      h: 5 + Math.random() * 7,
      color: colors[Math.floor(Math.random() * colors.length)],
      vy: 2 + Math.random() * 4,
      vx: (Math.random() - .5) * 5,
      ang: Math.random() * Math.PI * 2,
      spin: (Math.random() - .5) * .2,
      gravity: .08 + Math.random() * .07,
    });
  }
  if (!rafId) rafId = requestAnimationFrame(drawConfetti);
}

function drawConfetti() {
  c2d.clearRect(0, 0, cvs.width, cvs.height);
  pieces = pieces.filter(p => p.y < cvs.height + 30);
  pieces.forEach(p => {
    p.y += p.vy; p.x += p.vx; p.vy += p.gravity; p.ang += p.spin;
    c2d.save();
    c2d.translate(p.x, p.y);
    c2d.rotate(p.ang);
    c2d.fillStyle = p.color;
    c2d.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    c2d.restore();
  });
  if (pieces.length) { rafId = requestAnimationFrame(drawConfetti); }
  else { rafId = null; c2d.clearRect(0, 0, cvs.width, cvs.height); }
}

// =============================================
//  浮き上がり絵文字
// =============================================
function spawnEmojis(list) {
  list.forEach((em, i) => {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'float-emoji';
      el.textContent = em;
      el.style.fontSize = (1.5 + Math.random()) + 'rem';
      el.style.left = (15 + Math.random() * 70) + '%';
      el.style.top  = (30 + Math.random() * 40) + '%';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1900);
    }, i * 180);
  });
}

// =============================================
//  フィードバックテキスト
// =============================================
function showFeedback(text, color) {
  const el = document.getElementById('feedback-text');
  el.textContent = text;
  el.style.color = color;
  el.classList.remove('in','out');
  void el.offsetWidth;
  el.classList.add('in');
  setTimeout(() => {
    el.classList.replace('in','out');
    setTimeout(() => el.classList.remove('out'), 400);
  }, 900);
}

//  背景の星を生成
// =============================================
(function() {
  const bg = document.getElementById('bg-stars');
  const ems = ['⭐','✨','🌟','💫'];
  for (let i = 0; i < 22; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = ems[i % ems.length];
    s.style.left  = Math.random() * 100 + '%';
    s.style.top   = Math.random() * 100 + '%';
    s.style.fontSize = (.9 + Math.random() * 1.4) + 'rem';
    s.style.animationDelay = (Math.random() * 2) + 's';
    bg.appendChild(s);
  }
})();
